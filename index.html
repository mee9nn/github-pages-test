<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub Pages サンドボックス</title>
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background: #f0f4f8;
    }
    .card {
      background: white;
      padding: 2rem 3rem;
      border-radius: 12px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.1);
      text-align: center;
    }
    h1 { color: #2d3748; }
    p { color: #718096; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Hello, GitHub Pages!</h1>
    <p>このサイトは GitHub Pages で公開されています。</p>
  </div>
</body>
</html>
